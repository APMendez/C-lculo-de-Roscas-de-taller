<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roscas PRO 🔩</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-green-100 to-yellow-100 min-h-screen text-gray-800">

<div class="max-w-md mx-auto p-4">

<h1 class="text-xl font-bold text-center mb-4">🔩 Roscas PRO</h1>

<select id="modo" onchange="cambiarModo()"
class="border p-2 rounded w-full mb-4">
<option value="identificar">🔍 Identificar</option>
<option value="consultar">📏 Consultar</option>
</select>

<!-- IDENTIFICAR -->
<div id="bloqueIdentificar" class="bg-white p-4 rounded-xl shadow mb-4">

<input id="diametro" type="number" placeholder="Diámetro (mm)"
class="border p-2 rounded w-full mb-2">

<input id="paso" type="number" placeholder="Paso (mm) o TPI"
class="border p-2 rounded w-full mb-2">

<button onclick="identificar()"
class="bg-green-300 w-full py-2 rounded">
Identificar
</button>

</div>

<!-- CONSULTAR -->
<div id="bloqueConsultar" class="bg-white p-4 rounded-xl shadow mb-4 hidden">

<select id="selector" onchange="mostrarDatos()"
class="border p-2 rounded w-full"></select>

</div>

<div class="bg-white p-4 rounded-xl shadow">
<pre id="resultado" class="text-sm"></pre>
</div>

</div>

<script>

// BASE
const roscas = [
{n:"M16x2", t:"Métrica", d:16, p:2, ang:60},
{n:"M20x2.5", t:"Métrica", d:20, p:2.5, ang:60},
{n:"M12x1.75", t:"Métrica", d:12, p:1.75, ang:60},

{n:"1/2 UNC", t:"UNC", d:12.7, tpi:13, ang:60},
{n:"1/2 UNF", t:"UNF", d:12.7, tpi:20, ang:60},

{n:"1/2 BSW", t:"Whitworth", d:12.7, tpi:12, ang:55},

{n:"1/2 BSPP", t:"Gas paralela", d:20.95, tpi:14, ang:55},
{n:"1/2 BSPT", t:"Gas cónica", d:20.95, tpi:14, ang:55}
];

// cargar selector
const sel = document.getElementById("selector");
roscas.forEach((r,i)=>{
  let o=document.createElement("option");
  o.value=i;
  o.text=r.n;
  sel.appendChild(o);
});

// cambio modo (FIX)
function cambiarModo(){
  const modo = document.getElementById("modo").value;

  document.getElementById("bloqueIdentificar").classList.toggle("hidden", modo !== "identificar");
  document.getElementById("bloqueConsultar").classList.toggle("hidden", modo !== "consultar");
}

// IDENTIFICAR (FIX REAL)
function identificar(){

  const d = parseFloat(document.getElementById("diametro").value);
  const pInput = parseFloat(document.getElementById("paso").value);

  if(!d || !pInput){
    resultado.innerText = "Ingresá diámetro y paso";
    return;
  }

  let candidatos = [];

  roscas.forEach(r=>{
    let pasoRef = r.p ? r.p : 25.4/r.tpi;

    let errorD = Math.abs(r.d - d);
    let errorP = Math.abs(pasoRef - pInput);

    // tolerancias reales
    if(errorD < 0.5 && errorP < 0.2){
      candidatos.push(r);
    }
  });

  if(candidatos.length === 0){
    resultado.innerText = "❌ No coincide con una rosca estándar de la tabla";
    return;
  }

  if(candidatos.length === 1){
    mostrar(candidatos[0], true);
  } else {
    let txt = "⚠️ Posibles coincidencias:\n\n";
    candidatos.forEach(r=>{
      txt += "- " + r.n + " (" + r.t + ")\n";
    });
    resultado.innerText = txt;
  }
}

// CONSULTAR
function mostrarDatos(){
  mostrar(roscas[document.getElementById("selector").value], false);
}

// MOSTRAR
function mostrar(r,aprox){

  let pasoMM = r.p ? r.p : 25.4/r.tpi;
  let pasoTxt = r.p ? r.p+" mm" : r.tpi+" TPI";

  let mecha = (r.d - pasoMM).toFixed(2);
  let nucleo = (r.d - 1.2*pasoMM).toFixed(2);
  let prof = (0.613 * pasoMM).toFixed(2);

  document.getElementById("resultado").innerText =
`${aprox?"✔ Rosca identificada\n\n":""}
Tipo: ${r.t}
Nombre: ${r.n}

Ø exterior: ${r.d} mm
Paso: ${pasoTxt}
Ángulo: ${r.ang}°

Ø núcleo: ${nucleo} mm
Profundidad: ${prof} mm

Mecha: ${mecha} mm`;
}

</script>

</body>
</html>
