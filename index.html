<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roscas PRO 🔩</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-green-100 to-yellow-100 min-h-screen text-gray-800">

<div class="max-w-md mx-auto p-4">

<h1 class="text-xl font-bold text-center mb-4">🔩 Roscas PRO</h1>

<!-- FILTRO -->
<select id="filtro" onchange="cargarSelector()"
class="border p-2 rounded w-full mb-2">
<option value="todas">Todas</option>
<option value="Métrica">Métrica</option>
<option value="Métrica fina">Métrica fina</option>
<option value="UNC">UNC</option>
<option value="UNF">UNF</option>
<option value="Whitworth">Whitworth</option>
<option value="Gas">Gas</option>
</select>

<!-- MODO -->
<select id="modo" onchange="cambiarModo()"
class="border p-2 rounded w-full mb-4">
<option value="identificar">🔍 Identificar</option>
<option value="consultar">📏 Consultar</option>
</select>

<!-- IDENTIFICAR -->
<div id="bloqueIdentificar" class="bg-white p-4 rounded-xl shadow mb-4">

<input id="diametro" type="number" placeholder="Diámetro (mm)"
class="border p-2 rounded w-full mb-2">

<input id="paso" type="number" placeholder="Paso (mm)"
class="border p-2 rounded w-full mb-2">

<button onclick="identificar()"
class="bg-green-300 w-full py-2 rounded">
Identificar
</button>

</div>

<!-- CONSULTAR -->
<div id="bloqueConsultar" class="bg-white p-4 rounded-xl shadow mb-4 hidden">

<select id="selector" onchange="mostrarDatos()"
class="border p-2 rounded w-full"></select>

</div>

<div class="bg-white p-4 rounded-xl shadow">
<pre id="resultado"></pre>
</div>

</div>

<script>

let roscas = [];

// =====================
// GENERACIÓN (igual que antes)
// =====================

const pasosCoarse = {
  3:0.5,4:0.7,5:0.8,6:1,8:1.25,10:1.5,12:1.75,
  14:2,16:2,18:2.5,20:2.5,22:2.5,24:3
};

const pasosFine = {
  10:[1.25],12:[1.5],16:[1.5],20:[1.5]
};

for(let d in pasosCoarse){
  roscas.push({n:`M${d}x${pasosCoarse[d]}`, t:"Métrica", d:+d, p:pasosCoarse[d], ang:60});
}

for(let d in pasosFine){
  pasosFine[d].forEach(p=>{
    roscas.push({n:`M${d}x${p}`, t:"Métrica fina", d:+d, p:p, ang:60});
  });
}

const pulgadas = [
  {n:"1/4", d:6.35, UNC:20, UNF:28},
  {n:"5/16", d:7.94, UNC:18, UNF:24},
  {n:"3/8", d:9.52, UNC:16, UNF:24},
  {n:"1/2", d:12.7, UNC:13, UNF:20},
  {n:"5/8", d:15.87, UNC:11, UNF:18}
];

pulgadas.forEach(p=>{
  roscas.push({n:`${p.n} UNC`, t:"UNC", d:p.d, tpi:p.UNC, ang:60});
  roscas.push({n:`${p.n} UNF`, t:"UNF", d:p.d, tpi:p.UNF, ang:60});
});

const whit = [
  {n:"1/4", d:6.35, tpi:20},
  {n:"5/16", d:7.94, tpi:18}
];

whit.forEach(w=>{
  roscas.push({n:`${w.n} BSW`, t:"Whitworth", d:w.d, tpi:w.tpi, ang:55});
});

const bsp = [
  {n:"1/4", d:13.16, tpi:19},
  {n:"3/8", d:16.66, tpi:19},
  {n:"1/2", d:20.95, tpi:14}
];

bsp.forEach(b=>{
  roscas.push({n:`${b.n} BSPP`, t:"Gas", d:b.d, tpi:b.tpi, ang:55});
  roscas.push({n:`${b.n} BSPT`, t:"Gas", d:b.d, tpi:b.tpi, ang:55});
});

// =====================
// FILTRADO
// =====================
function roscasFiltradas(){
  const f = document.getElementById("filtro").value;
  if(f==="todas") return roscas;
  return roscas.filter(r=>r.t.includes(f));
}

// =====================
// SELECTOR
// =====================
function cargarSelector(){
  const sel = document.getElementById("selector");
  sel.innerHTML = "";

  roscasFiltradas().forEach((r,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.text=r.n;
    sel.appendChild(o);
  });
}

// =====================
// UI
// =====================
function cambiarModo(){
  const m = modo.value;
  bloqueIdentificar.classList.toggle("hidden", m!=="identificar");
  bloqueConsultar.classList.toggle("hidden", m!=="consultar");
}

// =====================
// IDENTIFICAR
// =====================
function identificar(){

  const lista = roscasFiltradas();

  const d = parseFloat(diametro.value);
  const p = parseFloat(paso.value);

  let encontrados = [];

  lista.forEach(r=>{
    let paso = r.p ? r.p : 25.4/r.tpi;

    if(Math.abs(r.d - d)<0.5 && Math.abs(paso - p)<0.2){
      encontrados.push(r);
    }
  });

  if(encontrados.length===0){
    resultado.innerText="❌ No coincide";
    return;
  }

  let txt="Coincidencias:\n\n";
  encontrados.forEach(r=>{
    txt+=`- ${r.n} (${r.t})\n`;
  });

  resultado.innerText=txt;
}

// =====================
// MOSTRAR
// =====================
function mostrarDatos(){
  const lista = roscasFiltradas();
  const r = lista[selector.value];

  let paso = r.p ? r.p : 25.4/r.tpi;

  resultado.innerText=
`Tipo: ${r.t}
Nombre: ${r.n}

Ø exterior: ${r.d} mm
Paso: ${r.p ? r.p+" mm" : r.tpi+" TPI"}
Ángulo: ${r.ang}°

Mecha: ${(r.d - paso).toFixed(2)} mm`;
}

// init
cargarSelector();

</script>

</body>
</html>
