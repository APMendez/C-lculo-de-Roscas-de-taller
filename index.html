<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO Roscas 🔩</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-green-100 to-yellow-100 min-h-screen text-gray-800">

<div class="max-w-md mx-auto p-4">

<h1 class="text-xl font-bold text-center mb-4">PRO Roscas 🔩</h1>

<select id="filtro" onchange="cargarSelector()"
class="border p-2 rounded w-full mb-2">
<option value="todas">Todas</option>
<option value="Métrica">Métrica</option>
<option value="Métrica fina">Métrica fina</option>
<option value="UNC">UNC</option>
<option value="UNF">UNF</option>
<option value="Whitworth">Whitworth</option>
<option value="Gas">Gas</option>
</select>

<select id="modo" onchange="cambiarModo()"
class="border p-2 rounded w-full mb-4">
<option value="identificar">🔍 Identificar</option>
<option value="consultar">📏 Consultar</option>
</select>

<!-- IDENTIFICAR -->
<div id="bloqueIdentificar" class="bg-white p-4 rounded-xl shadow mb-4">

<input id="diametro" placeholder="Diámetro (mm o 1/2)"
class="border p-2 rounded w-full mb-2">

<input id="paso" placeholder="Paso (mm o TPI)"
class="border p-2 rounded w-full mb-2">

<button onclick="identificar()"
class="bg-green-300 w-full py-2 rounded">
Identificar
</button>

</div>

<!-- CONSULTAR -->
<div id="bloqueConsultar" class="bg-white p-4 rounded-xl shadow mb-4 hidden">

<select id="selector" onchange="mostrarDatos()"
class="border p-2 rounded w-full"></select>

</div>

<div id="resultado" class="space-y-2"></div>
<div id="detalle" class="mt-3 p-3 bg-blue-50 rounded-lg text-sm"></div>

</div>

<script>

// =====================
// PARSER DIÁMETRO (mm / pulgadas)
// =====================
function parseDiametro(val){
  if(!val) return null;

  if(val.includes("/")){
    let parts = val.split("/");
    return (parseFloat(parts[0]) / parseFloat(parts[1])) * 25.4;
  }

  return parseFloat(val);
}

// =====================
// PARSER PASO (mm o TPI)
// =====================
function parsePaso(val){
  if(!val) return null;

  let num = parseFloat(val);

  if(num > 5){
    return { tipo: "tpi", valor: num };
  } else {
    return { tipo: "mm", valor: num };
  }
}

// =====================
// BASE DE ROSCAS
// =====================
let roscas = [];

// MÉTRICAS
const metricas = {
3:0.5,4:0.7,5:0.8,6:1,8:1.25,10:1.5,12:1.75,
14:2,16:2,18:2.5,20:2.5,22:2.5,24:3
};

for(let d in metricas){
  roscas.push({n:`M${d}x${metricas[d]}`, t:"Métrica", d:+d, p:metricas[d], ang:60});
}

// FINAS
const finas = {
10:[1.25],12:[1.5],14:[1.5],16:[1.5],20:[1.5],24:[2]
};

for(let d in finas){
  finas[d].forEach(p=>{
    roscas.push({n:`M${d}x${p}`, t:"Métrica fina", d:+d, p:p, ang:60});
  });
}

// UNC / UNF
const pulgadas = [
["1/4",6.35,20,28],
["5/16",7.94,18,24],
["3/8",9.52,16,24],
["7/16",11.11,14,20],
["1/2",12.7,13,20],
["9/16",14.29,12,18],
["5/8",15.87,11,18],
["3/4",19.05,10,16],
["7/8",22.23,9,14],
["1",25.4,8,12]
];

pulgadas.forEach(p=>{
  roscas.push({n:`${p[0]} UNC`, t:"UNC", d:p[1], tpi:p[2], ang:60});
  roscas.push({n:`${p[0]} UNF`, t:"UNF", d:p[1], tpi:p[3], ang:60});
});

// BSP
const bsp = [
["1/4",13.16,19],
["3/8",16.66,19],
["1/2",20.95,14],
["3/4",26.44,14],
["1",33.25,11]
];

bsp.forEach(b=>{
  roscas.push({n:`${b[0]} BSPP`, t:"Gas", d:b[1], tpi:b[2], ang:55});
  roscas.push({n:`${b[0]} BSPT`, t:"Gas", d:b[1], tpi:b[2], ang:55});
});

// WHITWORTH
const whit = [
["1/4",6.35,20],
["3/8",9.52,16],
["1/2",12.7,12],
["5/8",15.87,11],
["3/4",19.05,10]
];

whit.forEach(w=>{
  roscas.push({n:`${w[0]} BSW`, t:"Whitworth", d:w[1], tpi:w[2], ang:55});
});

// =====================
// FILTRO
// =====================
function roscasFiltradas(){
  const f = filtro.value;
  if(f==="todas") return roscas;
  return roscas.filter(r=>r.t.includes(f));
}

// =====================
// SELECTOR
// =====================
function cargarSelector(){
  selector.innerHTML="";
  roscasFiltradas().forEach((r,i)=>{
    let o=document.createElement("option");
    o.value=i;
    o.text=r.n;
    selector.appendChild(o);
  });
}

// =====================
// UI
// =====================
function cambiarModo(){
  bloqueIdentificar.classList.toggle("hidden", modo.value!=="identificar");
  bloqueConsultar.classList.toggle("hidden", modo.value!=="consultar");
}

// =====================
// IDENTIFICAR CORREGIDO
// =====================
function identificar(){

  const lista = roscasFiltradas();

  const d = parseDiametro(diametro.value);
  const pasoInput = parsePaso(paso.value);

  resultado.innerHTML = "";
  detalle.innerHTML = "";

  let resultados = [];

  lista.forEach(r=>{

    let pasoMM = r.p ? r.p : 25.4/r.tpi;

    let match = true;

    if(d){
      if(Math.abs(r.d - d) > 0.7) match = false;
    }

    if(pasoInput){

      if(pasoInput.tipo === "mm"){
        if(Math.abs(pasoMM - pasoInput.valor) > 0.3) match = false;
      }

      if(pasoInput.tipo === "tpi"){
        if(!r.tpi || Math.abs(r.tpi - pasoInput.valor) > 1) match = false;
      }
    }

    if(match) resultados.push(r);
  });

  if(resultados.length === 0){
    resultado.innerHTML = "❌ No coincide con estándar";
    return;
  }

  resultados.forEach(r=>{
    let btn = document.createElement("button");

    btn.className = "w-full bg-green-200 hover:bg-green-300 transition p-2 rounded-lg text-left";

    btn.innerText = `${r.n} (${r.t})`;

    btn.onclick = () => mostrarDetalle(r);

    resultado.appendChild(btn);
  });
}

// =====================
// DETALLE
// =====================
function mostrarDetalle(r){

  let paso = r.p ? r.p : 25.4/r.tpi;

  detalle.innerText =
`🔩 ${r.n}

Tipo: ${r.t}

Ø exterior: ${r.d} mm
Paso: ${r.p ? r.p + " mm" : r.tpi + " TPI"}
Ángulo: ${r.ang}°

Mecha recomendada: ${(r.d - paso).toFixed(2)} mm`;
}

// =====================
// CONSULTAR
// =====================
function mostrarDatos(){
  const r = roscasFiltradas()[selector.value];
  mostrarDetalle(r);
}

// INIT
cargarSelector();

</script>

</body>
</html>
