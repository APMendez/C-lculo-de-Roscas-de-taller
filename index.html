<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roscas PRO 🔩</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 via-green-100 to-yellow-100 min-h-screen text-gray-800">

<div class="max-w-md mx-auto p-4">

<h1 class="text-xl font-bold text-center mb-4">🔩 Roscas PRO</h1>

<select id="modo" onchange="cambiarModo()"
class="border p-2 rounded w-full mb-4">
<option value="identificar">🔍 Identificar</option>
<option value="consultar">📏 Consultar</option>
</select>

<!-- IDENTIFICAR -->
<div id="identificar" class="bg-white p-4 rounded-xl shadow mb-4">

<input id="diametro" type="number" placeholder="Diámetro (mm)"
class="border p-2 rounded w-full mb-2">

<input id="paso" type="number" placeholder="Paso (mm) o TPI"
class="border p-2 rounded w-full mb-2">

<button onclick="identificar()"
class="bg-green-300 w-full py-2 rounded">
Identificar
</button>

</div>

<!-- CONSULTAR -->
<div id="consultar" class="bg-white p-4 rounded-xl shadow mb-4 hidden">

<select id="selector" onchange="mostrarDatos()"
class="border p-2 rounded w-full"></select>

</div>

<div class="bg-white p-4 rounded-xl shadow">
<pre id="resultado" class="text-sm"></pre>
</div>

</div>

<script>

// BASE COMPLETA (representativa de taller)
const roscas = [

//// METRICAS
{n:"M6x1", t:"Métrica", d:6, p:1, ang:60},
{n:"M8x1.25", t:"Métrica", d:8, p:1.25, ang:60},
{n:"M10x1.5", t:"Métrica", d:10, p:1.5, ang:60},
{n:"M10x1.25", t:"Métrica fina", d:10, p:1.25, ang:60},
{n:"M12x1.75", t:"Métrica", d:12, p:1.75, ang:60},
{n:"M12x1.5", t:"Métrica fina", d:12, p:1.5, ang:60},
{n:"M16x2", t:"Métrica", d:16, p:2, ang:60},

//// UNC
{n:"1/4 UNC", t:"UNC", d:6.35, tpi:20, ang:60},
{n:"5/16 UNC", t:"UNC", d:7.94, tpi:18, ang:60},
{n:"3/8 UNC", t:"UNC", d:9.52, tpi:16, ang:60},

//// UNF
{n:"1/4 UNF", t:"UNF", d:6.35, tpi:28, ang:60},
{n:"5/16 UNF", t:"UNF", d:7.94, tpi:24, ang:60},
{n:"3/8 UNF", t:"UNF", d:9.52, tpi:24, ang:60},

//// WHITWORTH
{n:"1/4 BSW", t:"Whitworth", d:6.35, tpi:20, ang:55},
{n:"5/16 BSW", t:"Whitworth", d:7.94, tpi:18, ang:55},

//// BSPP / BSPT
{n:"1/4 BSPP", t:"Gas paralela", d:13.16, tpi:19, ang:55},
{n:"1/4 BSPT", t:"Gas cónica", d:13.16, tpi:19, ang:55},
{n:"3/8 BSPP", t:"Gas paralela", d:16.66, tpi:19, ang:55},
{n:"3/8 BSPT", t:"Gas cónica", d:16.66, tpi:19, ang:55}

];

// CARGAR SELECT
const sel = document.getElementById("selector");
roscas.forEach((r,i)=>{
  let o=document.createElement("option");
  o.value=i;
  o.text=r.n;
  sel.appendChild(o);
});

function cambiarModo(){
  identificar.classList.toggle("hidden");
  consultar.classList.toggle("hidden");
}

// IDENTIFICAR
function identificar(){

  const d = parseFloat(diametro.value);
  const pInput = parseFloat(paso.value);

  let mejor=null;
  let errorMin=999;

  roscas.forEach(r=>{
    let pasoRef = r.p ? r.p : 25.4/r.tpi;

    let error = Math.abs(r.d - d) + Math.abs(pasoRef - pInput);

    if(error < errorMin){
      errorMin = error;
      mejor = r;
    }
  });

  if(mejor) mostrar(mejor,true);
}

// MOSTRAR
function mostrarDatos(){
  mostrar(roscas[selector.value],false);
}

function mostrar(r,aprox){

  let paso = r.p ? r.p+" mm" : r.tpi+" TPI";
  let pasoMM = r.p ? r.p : 25.4/r.tpi;

  let mecha = (r.d - pasoMM).toFixed(2);
  let nucleo = (r.d - 1.2*pasoMM).toFixed(2);
  let prof = (0.613 * pasoMM).toFixed(2);

  resultado.innerText =
`${aprox?"Rosca aproximada\n\n":""}
Tipo: ${r.t}
Nombre: ${r.n}

Ø exterior: ${r.d} mm
Paso: ${paso}
Ángulo: ${r.ang}°

Ø núcleo aprox: ${nucleo} mm
Profundidad teórica: ${prof} mm

Mecha recomendada: ${mecha} mm

Nota:
- Usar macho adecuado (${r.t})
- Lubricar bien en inox`;
}

</script>

</body>
</html>
